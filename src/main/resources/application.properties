spring.application.name=mypelink-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mypelink_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:mypelink-secret-key-cajamarca-2026-upn-capstone-muy-larga}
app.jwt.expiration=86400000

spring.flyway.enabled=false
spring.jpa.open-in-view=false
server.port=8080

logging.level.org.springframework.security=DEBUG
logging.level.com.mypelink=DEBUG